{{define "base"}}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}Lantern{{end}}</title>
  <link rel="icon" type="image/png" href="/favicon-32.png?v={{.Version}}">
  <!-- Critical CSS: sets background/text/font before any stylesheet loads to prevent white flash -->
  <style>:root{--bg:#0d0b08;--bg-warm:#1a1510;--text:#e8e0d0}body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:radial-gradient(ellipse at 50% 0%,#1a1510 0%,#0d0b08 70%);color:#e8e0d0;min-height:100vh}</style>
  <link rel="stylesheet" href="/vendor/bootstrap.min.css?v={{.Version}}" fetchpriority="high">
  <link rel="stylesheet" href="/style.css?v={{.Version}}">
  <script defer src="/vendor/bootstrap.bundle.min.js?v={{.Version}}"></script>
  <script defer src="/vendor/htmx.min.js?v={{.Version}}"></script>
  <script defer src="/app.js?v={{.Version}}"></script>
</head>
<body{{block "body-attrs" .}}{{end}}>

<div id="htmx-topbar"></div>

{{block "content" .}}{{end}}

<!-- Bootstrap Modal -->
<div class="modal fade" id="app-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body pt-1" id="modal-content"></div>
    </div>
  </div>
</div>

<!-- Bootstrap Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="app-toast" class="toast" role="alert" aria-atomic="true">
    <div class="toast-body" id="toast-msg"></div>
  </div>
</div>

{{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
