{{if .Service}}
<h3>Edit Service</h3>
<form hx-put="/api/services/{{.Service.ID}}"
      hx-swap="none">

  <input type="hidden" name="discovered_id" value="">

  <div class="mb-3">
    <label>Icon</label>
    {{template "icon-preview.html" .Service}}
    <div class="icon-edit-row">
      <label class="btn btn-ghost btn-sm" style="cursor:pointer">
        Upload
        <input type="file" name="icon" accept="image/*" style="display:none"
               hx-post="/api/services/{{.Service.ID}}/icon"
               hx-encoding="multipart/form-data"
               hx-trigger="change"
               hx-target="#icon-preview"
               hx-swap="outerHTML">
      </label>
      <button type="button" class="btn btn-ghost btn-sm"
              hx-post="/api/services/{{.Service.ID}}/favicon"
              hx-target="#icon-preview"
              hx-swap="outerHTML">Pull Favicon</button>
      <button type="button" class="btn btn-ghost btn-sm"
              hx-delete="/api/services/{{.Service.ID}}/icon"
              hx-target="#icon-preview"
              hx-swap="outerHTML">Clear</button>
    </div>
  </div>

  <div class="mb-3">
    <label>Name</label>
    <input class="input input-bordered w-full" name="name" value="{{.Service.Name}}" required>
  </div>

  <div>
    <input type="hidden" name="direct_only_present" value="1">
    <div class="mb-3 subdomain-group"{{if .Service.DirectOnly}} style="display:none"{{end}}>
      <label>Subdomain</label>
      <div class="subdomain-wrap" data-domain="{{.Domain}}">
        <input class="input input-bordered w-full" name="subdomain" value="{{.Service.Subdomain}}">
        <div class="subdomain-hint">{{if .Service.Subdomain}}{{.Service.Subdomain}}.{{.Domain}}{{end}}</div>
      </div>
    </div>
    <div class="mb-3">
      <label>Target URL</label>
      <input class="input input-bordered w-full" name="target" value="{{.Service.Target}}" placeholder="http://10.0.0.5:8080" required>
    </div>
    <div class="mb-3">
      <label>Category</label>
      <input class="input input-bordered w-full" name="category" value="{{.Service.Category}}" list="categories-list" placeholder="Optional">
      <datalist id="categories-list">
        {{range .Categories}}<option value="{{.}}">{{end}}
      </datalist>
    </div>
    <input type="hidden" name="tunnel_present" value="1">
    <input type="hidden" name="skip_health_present" value="1">
    <div class="flex flex-wrap gap-3 mb-3 items-center">
      <label class="label cursor-pointer gap-2">
        <input class="checkbox checkbox-sm" type="checkbox" id="cb-direct-only" name="direct_only" {{if .Service.DirectOnly}}checked{{end}}>
        Direct link
      </label>
      {{if .TunnelEnabled}}
      <label class="label cursor-pointer gap-2">
        <input class="checkbox checkbox-sm" type="checkbox" id="cb-tunnel" name="tunnel" {{if isTunneled .Service}}checked{{end}}>
        Cloudflare Tunnel
      </label>
      {{end}}
      <label class="label cursor-pointer gap-2">
        <input class="checkbox checkbox-sm" type="checkbox" id="cb-skip-health" name="skip_health" {{if .Service.SkipHealth}}checked{{end}}>
        Skip health check
      </label>
    </div>
  </div>
  <div class="flex gap-2 justify-end mt-3">
    <button type="button" class="btn btn-ghost" onclick="this.closest('dialog').close()">Cancel</button>
    <button type="submit" class="btn btn-warning">Save</button>
  </div>
</form>
{{else}}
<h3>Add Service</h3>
<form hx-post="/api/services"
      hx-swap="none"
      hx-encoding="multipart/form-data">

  <input type="hidden" name="discovered_id" value="">

  <div class="mb-3">
    <label>Icon</label>
    <div id="icon-preview">
      <div style="width:64px;height:64px;background:var(--surface);border-radius:10px;
                  display:flex;align-items:center;justify-content:center;font-size:2rem">📦</div>
    </div>
    <div class="icon-edit-row">
      <label class="btn btn-ghost btn-sm" style="cursor:pointer">
        Upload
        <input type="file" name="icon" accept="image/*" style="display:none"
               onchange="const f=this.files[0];if(f){const r=new FileReader();r.onload=e=>{const p=document.getElementById('icon-preview');p.innerHTML='<img src=\''+e.target.result+'\' width=64 height=64 style=\'border-radius:10px;object-fit:contain;background:var(--surface)\'>'};r.readAsDataURL(f)}">
      </label>
    </div>
  </div>

  <div class="mb-3">
    <label>Name</label>
    <input class="input input-bordered w-full" name="name" placeholder="My Service">
  </div>

  <div>
    <div class="mb-3 subdomain-group">
      <label>Subdomain</label>
      <div class="subdomain-wrap" data-domain="{{.Domain}}">
        <input class="input input-bordered w-full" name="subdomain" placeholder="myservice">
        <div class="subdomain-hint"></div>
      </div>
    </div>
    <div class="mb-3">
      <label>Target URL</label>
      <input class="input input-bordered w-full" name="target" placeholder="http://10.0.0.5:8080" required>
    </div>
    <div class="mb-3">
      <label>Category</label>
      <input class="input input-bordered w-full" name="category" list="categories-list" placeholder="Optional">
      <datalist id="categories-list">
        {{range .Categories}}<option value="{{.}}">{{end}}
      </datalist>
    </div>
    <div class="flex flex-wrap gap-3 mb-3 items-center">
      <label class="label cursor-pointer gap-2">
        <input class="checkbox checkbox-sm" type="checkbox" id="cb-direct" name="direct_only">
        Direct link
      </label>
      {{if .TunnelEnabled}}
      <label class="label cursor-pointer gap-2">
        <input class="checkbox checkbox-sm" type="checkbox" id="cb-tunnel" name="tunnel">
        Cloudflare Tunnel
      </label>
      {{end}}
      <label class="label cursor-pointer gap-2">
        <input class="checkbox checkbox-sm" type="checkbox" id="cb-skip-health" name="skip_health">
        Skip health check
      </label>
    </div>
  </div>
  <div class="flex gap-2 justify-end mt-3">
    <button type="button" class="btn btn-ghost" onclick="this.closest('dialog').close()">Cancel</button>
    <button type="submit" class="btn btn-warning">Add Service</button>
  </div>
</form>
{{end}}
