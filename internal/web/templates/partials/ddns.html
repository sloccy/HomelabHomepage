{{if .Domains}}
<div class="table-container">
  <table class="table table-sm table-striped table-hover w-100">
    <thead><tr><th>Domain</th><th>Points To</th><th></th></tr></thead>
    <tbody>
      {{range .Domains}}
      <tr>
        <td><code>{{.}}</code></td>
        <td>{{$.PublicIP}}</td>
        <td class="td-actions">
          <div class="d-flex align-items-center justify-content-end gap-2">
            <button class="btn btn-danger btn-sm"
                    hx-delete="/api/ddns/{{.}}"
                    hx-target="closest tr"
                    hx-swap="delete"
                    hx-confirm="Delete {{.}}?">Delete</button>
          </div>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="empty-msg" style="text-align:center;padding:1rem 2rem">No DDNS domains configured.</p>
{{end}}
<div class="card-form-row">
  <form hx-post="/api/ddns"
        hx-target="#ddns-list"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input class="form-control" name="domain"
           placeholder="home.example.com" required>
    <button class="btn btn-warning btn-sm" type="submit">+ Add</button>
  </form>
</div>
