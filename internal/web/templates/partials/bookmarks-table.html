{{if .}}
<div class="table-container">
  <table class="table table-sm table-striped table-hover w-100">
    <thead>
      <tr><th>Name</th><th>URL</th><th>Category</th><th></th></tr>
    </thead>
    <tbody>
      {{range .}}
      <tr>
        <td>{{.Name}}</td>
        <td class="link-cell">
          <a href="{{.URL}}" target="_blank" rel="noopener">{{.URL}}</a>
        </td>
        <td>{{if .Category}}{{.Category}}{{else}}—{{end}}</td>
        <td class="td-actions">
          <div class="d-flex align-items-center justify-content-end gap-2">
            <button class="btn btn-outline-secondary btn-sm"
                    hx-get="/fragments/bookmark-form/{{.ID}}"
                    hx-target="#modal-content">Edit</button>
            <button class="btn btn-danger btn-sm"
                    hx-delete="/api/bookmarks/{{.ID}}"
                    hx-target="closest tr"
                    hx-swap="delete"
                    hx-confirm="Delete {{.Name}}?">Delete</button>
          </div>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="empty-msg">No bookmarks yet.</p>
{{end}}
